<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finvy CRM & Outreach</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            background-image: radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
                              radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.1), transparent 25%);
            background-attachment: fixed;
            min-height: 100vh;
            padding: 1rem;
        }

        .container { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.5rem; }
        
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 1rem; border-bottom: 1px solid var(--border);
        }

        h1 {
            font-size: 1.5rem; font-weight: 700;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .glass-panel {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.25rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .controls-row {
            display: grid; grid-template-columns: 1fr auto auto; gap: 1rem; align-items: end;
        }

        @media (max-width: 768px) {
            .controls-row { grid-template-columns: 1fr; }
            .desktop-only { display: none; }
            body { padding: 0.75rem; }
        }

        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
        label { font-size: 0.8rem; font-weight: 500; color: var(--text-muted); text-transform: uppercase; }

        select {
            background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border);
            color: white; padding: 0.75rem; border-radius: 8px; font-size: 1rem; outline: none;
        }

        button {
            background: var(--primary); color: white; border: none;
            padding: 0.75rem 1.25rem; border-radius: 8px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; display: inline-flex;
            align-items: center; justify-content: center; gap: 0.5rem;
        }
        button:hover { background: var(--primary-hover); transform: translateY(-1px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        button.success { background: var(--success); }
        button.danger { background: #ef4444; }

        /* Таблица для десктопа */
        .table-container { overflow-x: auto; margin-top: 1rem; }
        table { width: 100%; border-collapse: collapse; display: table; }
        th, td { padding: 1rem; border-bottom: 1px solid var(--border); text-align: left; }
        
        /* Карточки для мобилок */
        .business-list { display: flex; flex-direction: column; gap: 1rem; }
        .biz-card {
            display: none; flex-direction: column; gap: 0.75rem;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 12px; padding: 1rem;
        }

        @media (max-width: 768px) {
            table { display: none; }
            .biz-card { display: flex; }
        }

        .badge {
            display: inline-block; padding: 0.2rem 0.5rem; border-radius: 6px;
            font-size: 0.7rem; font-weight: 700; background: rgba(59, 130, 246, 0.2); color: #93c5fd;
        }

        .pitch-preview {
            background: rgba(15, 23, 42, 0.4); padding: 0.75rem; border-radius: 8px;
            font-size: 0.9rem; line-height: 1.5; white-space: pre-wrap; color: #e2e8f0;
            margin-top: 0.5rem; border: 1px solid rgba(255,255,255,0.05);
        }

        .loading-spinner {
            display: inline-block; width: 1rem; height: 1rem;
            border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #loader-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.9); z-index: 1000;
            display: none; justify-content: center; align-items: center; flex-direction: column; gap: 1rem;
        }
    </style>
</head>
<body>

    <div id="loader-overlay">
        <div class="loading-spinner" style="width: 3rem; height: 3rem; border-width: 4px;"></div>
        <div id="loader-text">Обработка...</div>
    </div>

    <div class="container">
        <header>
            <div>
                <h1>Finvy Outreach</h1>
                <p style="color: var(--text-muted); font-size: 0.8rem;">38 бизнесов загружено</p>
            </div>
            <div id="total-stats" class="badge">База: 38</div>
        </header>

        <div class="glass-panel">
            <div class="controls-row">
                <div class="form-group">
                    <label>Канал связи</label>
                    <select id="select-channel">
                        <option value="whatsapp">💬 WhatsApp</option>
                        <option value="email">✉️ Email</option>
                        <option value="instagram">📷 Instagram DM</option>
                    </select>
                </div>
                <button id="btn-generate-all" class="success" onclick="generateAllVisible()">
                    ⚡ Сгенерировать спитчи
                </button>
                <button id="btn-clear" class="danger" onclick="clearAllData()">
                    🗑 Сбросить
                </button>
            </div>
        </div>

        <!-- Контент -->
        <div id="business-container" class="business-list">
            <!-- Сюда JS вставит либо таблицу (Desktop), либо карточки (Mobile) -->
            <div class="table-container desktop-only">
                <table>
                    <thead>
                        <tr>
                            <th>Компания</th>
                            <th>Контакты</th>
                            <th>Спитч</th>
                        </tr>
                    </thead>
                    <tbody id="desktop-tbody"></tbody>
                </table>
            </div>
            <div id="mobile-list"></div>
        </div>
    </div>

    <script>
        let allBusinesses = [];

        document.addEventListener('DOMContentLoaded', loadBusinesses);

        async function loadBusinesses() {
            try {
                const res = await fetch('/api/businesses');
                const data = await res.json();
                allBusinesses = data.businesses || [];
                renderUI();
            } catch (e) { console.error(e); }
        }

        function renderUI() {
            const desktopTbody = document.getElementById('desktop-tbody');
            const mobileList = document.getElementById('mobile-list');
            desktopTbody.innerHTML = '';
            mobileList.innerHTML = '';
            
            document.getElementById('total-stats').innerText = `База: ${allBusinesses.length}`;

            allBusinesses.forEach(b => {
                const id = b.place_id || b.name;
                const channel = document.getElementById('select-channel').value;
                const pitchKey = `pitch_finvy_main_${channel}`;
                const pitch = b[pitchKey] || "";

                const contactHtml = `
                    <div style="font-size: 0.85rem; color: var(--text-muted);">
                        ${b.phone ? `📱 ${b.phone}<br>` : ''}
                        ${b.whatsapp ? `💬 ${b.whatsapp}<br>` : ''}
                        ${b.emails ? `✉️ ${b.emails}` : ''}
                    </div>
                `;

                const pitchHtml = `
                    <div id="pitch-container-${id}">
                        ${pitch ? `<div class="pitch-preview">${pitch}</div>` : `<span style="color:var(--text-muted); font-size: 0.8rem;">Спитч не готов</span>`}
                    </div>
                `;

                // Desktop Row
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${b.name}</strong><br><small>${b.address?.split(',')[0]}</small></td>
                    <td>${contactHtml}</td>
                    <td>${pitchHtml}</td>
                `;
                desktopTbody.appendChild(tr);

                // Mobile Card
                const card = document.createElement('div');
                card.className = 'biz-card';
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:start;">
                        <strong>${b.name}</strong>
                        <span class="badge">${b.rating} ★</span>
                    </div>
                    ${contactHtml}
                    ${pitchHtml}
                `;
                mobileList.appendChild(card);
            });
        }

        async function generateAllVisible() {
            const channel = document.getElementById('select-channel').value;
            showLoader(`Генерация ${channel} спитчей...`);
            
            for (let biz of allBusinesses) {
                const id = biz.place_id || biz.name;
                try {
                    const res = await fetch('/api/generate_single', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ business: biz, scenario: 'finvy_main', channel })
                    });
                    const data = await res.json();
                    biz[`pitch_finvy_main_${channel}`] = data.business[`pitch_finvy_main_${channel}`];
                } catch(e) { console.error(e); }
            }
            
            hideLoader();
            renderUI();
        }

        async function clearAllData() {
            if(!confirm("Удалить все сгенерированные спитчи?")) return;
            allBusinesses.forEach(b => {
                for(let k in b) if(k.startsWith("pitch_")) b[k] = "";
            });
            renderUI();
        }

        function showLoader(text) {
            document.getElementById('loader-text').innerText = text;
            document.getElementById('loader-overlay').style.display = 'flex';
        }
        function hideLoader() {
            document.getElementById('loader-overlay').style.display = 'none';
        }

        // Обновление при смене канала
        document.getElementById('select-channel').addEventListener('change', renderUI);
    </script>
</body>
</html>
